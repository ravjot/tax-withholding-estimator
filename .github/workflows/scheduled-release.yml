name: Scheduled Release

on:
  # schedule:
  #   - cron: '0 14 * * 1,3'  # Monday and Wednesday at 2pm UTC
  workflow_dispatch:          # Manual trigger for testing

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 #TODO: replace with a SHA
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Bump patch version
        run: |
          VERSION_PATH=".github/VERSION"
          CURRENT=$(tr -d '[:space:]' < "$VERSION_PATH")

          # Strip v prefix, split semver, bump patch, re-add prefix
          BASE="${CURRENT#v}"
          MAJOR="${BASE%%.*}"
          REST="${BASE#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"
          NEW="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "$NEW" > "$VERSION_PATH"
          echo "Bumping $CURRENT → $NEW"

      - name: Commit and push
        run: |
          git config user.name "df-irs-svc"
          git config user.email "200273578+df-irs-svc@users.noreply.github.com"
          git add .github/VERSION
          git commit -m "Release $(cat .github/VERSION)"
          git push

